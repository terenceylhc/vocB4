    <style>
        body {
            background-color: #f8fafc;
        }
        
        .card-perspective {
            perspective: 1500px;
            position: relative;
            transition: height 0.4s ease;
        }
        
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            transform-style: preserve-3d;
        }
        
        .card-perspective.flipped .card-inner {
            transform: rotateY(180deg);
        }
        
        .card-front, .card-back {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            border-radius: 28px;
            background-color: #ffffff;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        
        .card-back {
            transform: rotateY(180deg);
        }

        .sprite-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            border-top-left-radius: 27px;
            border-top-right-radius: 27px;
            background-color: #f8fafc;
        }

        .sprite-img {
            position: absolute;

            top: -2%;
            left: -2%;
            width: 104%;
            height: 104%;
            background-size: 406%; /* 溢位裁切規格 */
            background-repeat: no-repeat;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;

            "strategy": "意境記憶 (在冰雪中強壯破土)",
            "mnemonic": "儘管大雪紛飛、冰天雪地，翠綠的小嫩芽依然強壯地破冰而出。",
            "ex": "In spite of the fact that Emily’s not so rich, she still gives most of her money to the poor.",
            "grid": 3,
            "pos_idx": 3
          }
        ];

        // 引入本地或原圖庫的 Sprite 影像位置
        const spriteUrls = {
            1: "https://raw.githubusercontent.com/terenceylhc/vocB4/main/B4L6G1.jpg",
            2: "https://raw.githubusercontent.com/terenceylhc/vocB4/main/B4L6G2.jpg",
            3: "https://raw.githubusercontent.com/terenceylhc/vocB4/main/B4L6G3.jpg"
        };

        // 熟記狀態紀錄
        let masteredWords = JSON.parse(localStorage.getItem('mastered_B4L6_words')) || [];
        let autoTTS = true;

        // TTS 發音功能
        function speakWord(wordText) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(wordText);
                utterance.lang = 'en-US';
                utterance.rate = 0.85; 
                window.speechSynthesis.speak(utterance);
            }
        }

        function getBackgroundPosition(grid, posIdx) {
            const col = posIdx % 4;
            const row = Math.floor(posIdx / 4);
            const xOffset = (col / 3) * 100;
            let yOffset = (row / 3) * 100;
            
            if (grid === 2) {
                if (row === 1) {
                    yOffset += 1.8; // enroll 到 military service
                } else if (row === 2) {
                    yOffset += 2.6; // township 到 cuisine (增加溢位，阻擋頂部滲入)
                } else if (row === 3) {
                    yOffset += 1.8; // head 到 aside from
                }
            }
            
            return `${xOffset.toFixed(4)}% ${yOffset.toFixed(4)}%`;
        }

        // 卡片翻轉
        function toggleFlip(cardId, wordEn) {
            const cardEl = document.getElementById(cardId);
            const isFlipped = cardEl.classList.toggle('flipped');
            
            if (isFlipped && autoTTS) {
                setTimeout(() => {
                    speakWord(wordEn);
                }, 200);
            }
        }

        // 熟記狀態切換
        function toggleMastered(index, event) {
            event.stopPropagation(); // 防止觸發翻牌
            
            const word = vocabData[index];
            const masteredIdx = masteredWords.indexOf(word.en);
            
            if (masteredIdx > -1) {
                masteredWords.splice(masteredIdx, 1);
            } else {
                masteredWords.push(word.en);
            }
            
            localStorage.setItem('mastered_B4L6_words', JSON.stringify(masteredWords));
            
            updateProgress();
            renderGrid();
        }

        // 更新學習熟記進度條
        function updateProgress() {
            const total = vocabData.length;
            const masteredCount = masteredWords.filter(en => vocabData.some(v => v.en === en)).length;
            const percentage = (masteredCount / total) * 100;
            
            document.getElementById('progress-text').innerText = `${masteredCount} / ${total}`;
            document.getElementById('progress-bar').style.width = `${percentage}%`;
        }

        function renderGrid() {
            const gridContainer = document.getElementById('cards-grid');
            gridContainer.innerHTML = '';
            
            vocabData.forEach((word, index) => {
                const cardId = `card-${index}`;
                const bgPos = getBackgroundPosition(word.grid, word.pos_idx);
                const spriteUrl = spriteUrls[word.grid];
                const isMastered = masteredWords.includes(word.en);
                
                const cardHtml = `
                    <div id="${cardId}" class="card-perspective cursor-pointer" onclick="toggleFlip('${cardId}', '${word.en}')">
                        <div class="card-inner">
                            
                            <!-- ================= 正面呈現 (Visual Cue Panel) ================= -->
                            <div class="card-front">
                                <!-- 影像區 -->
                                <div class="sprite-container shadow-inner">
                                    <div class="sprite-img" style="background-image: url('${spriteUrl}'); background-position: ${bgPos};"></div>
                                    <!-- 浮動熟記標章 -->
                                    <button onclick="toggleMastered(${index}, event)" class="absolute top-4 right-4 p-3 rounded-full transition-all duration-300 transform hover:scale-110 z-20 ${isMastered ? 'bg-emerald-500 text-white shadow-lg shadow-emerald-500/30' : 'bg-white/80 hover:bg-white text-slate-400 border border-slate-200/50 backdrop-blur-sm shadow-md'}">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                                        </svg>
                                    </button>
                                </div>
                                
                                <!-- 文字區：2.5rem 粗體、音標與朗讀按鈕 -->
                                <div class="flex-grow flex flex-col justify-center items-center text-center px-8 py-10 min-h-[160px]">
                                    <h2 class="text-[2.5rem] font-black text-slate-900 leading-tight tracking-tight">${word.en}</h2>
                                    <div class="flex items-center gap-2 mt-3">
                                        <span class="text-lg font-medium text-slate-500 font-mono">${word.ph}</span>
                                        <button onclick="event.stopPropagation(); speakWord('${word.en}')" class="p-2 hover:bg-slate-100 rounded-full text-orange-500 transition active:scale-95" title="發音">
                                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15.536 8.464a5 5 0 010 7.072M18.364 5.636a9 9 0 010 12.728M12 18.75V5.25L7.75 9.5H4.5v5h3.25L12 18.75z"></path>
                                            </svg>
                                        </button>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- ================= 反面呈現 (Textual Content Panel) ================= -->
                            <div class="card-back p-8 flex flex-col justify-between">
                                <!-- 浮動熟記標章 -->
                                <div class="absolute top-4 right-4 z-20">
                                    <button onclick="toggleMastered(${index}, event)" class="p-3 rounded-full transition-all duration-300 transform hover:scale-110 ${isMastered ? 'bg-emerald-500 text-white shadow-lg shadow-emerald-500/30' : 'bg-slate-50 text-slate-400 border border-slate-200'}" title="標記熟記">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                                        </svg>
                                    </button>
                                </div>

                                <!-- 整體內容垂直置中 -->
                                <div class="flex-grow flex flex-col justify-center gap-6">
                                    <div class="text-center">
                                        <!-- 單字 3.2rem -->
                                        <h2 class="text-[3.2rem] font-black text-[#0f172a] leading-none tracking-tight">${word.en}</h2>
                                        <!-- 詞性標籤與中文翻譯 -->
                                        <div class="flex items-center justify-center gap-3 mt-3 flex-wrap">
                                            <span class="text-[1.1rem] px-3 py-1 bg-slate-100 text-slate-700 font-bold italic rounded-lg border border-slate-200">${word.pos}</span>
                                            <span class="text-[1.6rem] font-bold text-slate-800">${word.cn}</span>
                                        </div>
                                    </div>

                                    <!-- 策略提示 -->
                                    <div class="text-center text-slate-600 text-[1.05rem] font-medium leading-relaxed">
                                        💡 <span class="font-bold">策略：</span>${word.strategy}
                                    </div>

                                    <!-- 口訣方塊 (背景色為橘色 #ff9800，圓角 20px) -->
                                    <div class="bg-[#ff9800] text-white p-5 rounded-[20px] shadow-md shadow-orange-500/10 text-center">
                                        <p class="text-[1.3rem] font-bold leading-relaxed tracking-wide">${word.mnemonic}</p>
                                    </div>

                                    <!-- 例句區：上方一條灰色細虛線 -->
                                    <div class="pt-5 border-t border-dashed border-slate-300">
                                        <div class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1.5 text-center">實用例句 Context</div>
                                        <p class="text-[1.25rem] text-slate-500 italic font-medium leading-relaxed text-center font-serif">
                                            "${word.ex}"
                                        </p>
                                    </div>
                                </div>
                            </div>
                            
                        </div>
                    </div>
                `;
                
                gridContainer.insertAdjacentHTML('beforeend', cardHtml);
            });
            
            // 每次渲染網格後，動態更新卡片高度同步，以滿足自適應高度
            setTimeout(syncCardHeights, 100);
        }

        function syncCardHeights() {
            const cards = document.querySelectorAll('.card-perspective');
            
            // 1. 重設所有卡片高度以測量其實際自然高度
            cards.forEach(card => {
                card.style.height = 'auto';
                const front = card.querySelector('.card-front');
                const back = card.querySelector('.card-back');
                front.style.height = 'auto';
                back.style.height = 'auto';
            });
            
            // 2. 尋找全網頁所有卡片（包含正反面）的最大高度值
            let globalMaxHeight = 0;
            cards.forEach(card => {
                const front = card.querySelector('.card-front');
                const back = card.querySelector('.card-back');
                const maxForCard = Math.max(front.scrollHeight, back.scrollHeight);
                if (maxForCard > globalMaxHeight) {
                    globalMaxHeight = maxForCard;
                }
            });
            
            // 3. 將全域最大高度套用到每張卡片上，確保大小完全一致且不留底邊空白
            cards.forEach(card => {
                card.style.height = `${globalMaxHeight}px`;
                const front = card.querySelector('.card-front');
                const back = card.querySelector('.card-back');
                front.style.height = '100%';
                back.style.height = '100%';
            });
        }

        // 頁面初始化事件：直接進入單字頁面，不顯示任何彈窗
        window.onload = function () {
            const ttsToggle = document.getElementById('tts-toggle');
            const ttsToggleDot = document.getElementById('tts-toggle-dot');

            // 自動語音播放開關監聽
            ttsToggle.addEventListener('click', () => {
                autoTTS = !autoTTS;
                if (autoTTS) {
                    ttsToggle.classList.remove('bg-gray-200');
                    ttsToggle.classList.add('bg-orange-500');
                    ttsToggleDot.classList.remove('translate-x-0');
                    ttsToggleDot.classList.add('translate-x-5');
                } else {
                    ttsToggle.classList.remove('bg-orange-500');
                    ttsToggle.classList.add('bg-gray-200');
                    ttsToggleDot.classList.remove('translate-x-5');
                    ttsToggleDot.classList.add('translate-x-0');
                }
            });

            // 略過初始化直接載入單字
            updateProgress();
            renderGrid();

            // 響應式高度同步監聽
            window.addEventListener('resize', syncCardHeights);
        }
    </script>
</body>
</html>
