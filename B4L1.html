<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B4L1 互動單字記憶卡</title>
    <style>
        :root {
            --primary-blue: #2c3e50;
            --accent-orange: #E67E22;
            --bg-color: #f0f2f5;
            --card-white: #ffffff;
            --text-gray: #7f8c8d;
            --shadow: 0 10px 20px rgba(0,0,0,0.08);
        }

        body {
            font-family: 'Segoe UI', "Microsoft JhengHei", Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--primary-blue);
            font-size: 1.8rem;
            margin-bottom: 30px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* Task 2: 全網格顯示佈局鐵律 */
        .card-container {
            display: grid;
            gap: 25px;
            max-width: 1100px;
            width: 100%;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        }

        @media (min-width: 1024px) {
            .card-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Task 3: 視覺規範 - 卡片容器 */
        .card {
            perspective: 1000px;
            cursor: pointer;
            /* Task 2: 高度自適應 */
            min-height: 480px; 
            display: flex;
        }

        .card-inner {
            position: relative;
            width: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            border-radius: 20px;
            box-shadow: var(--shadow);
        }

        .card.is-flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            background: var(--card-white);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Task 1: 影像無框裁切 (450% 擠出邊框) */
        .image-box {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-size: 450% 450%; /* 改為 450% 強力裁切 */
            background-repeat: no-repeat;
            background-color: #f8f9fa;
        }

        /* 正面層次優化 */
        .front-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        .word-title {
            font-size: 2.6rem;
            color: var(--primary-blue);
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.5px;
        }

        .ipa-section {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 15px;
            color: var(--text-gray);
        }

        .symbol {
            font-size: 1.2rem;
            font-family: 'Arial', sans-serif;
        }

        .audio-btn {
            background: #f1f3f4;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .audio-btn:hover {
            background: #e8eaed;
            transform: scale(1.1);
        }

        /* 背面版面優化 (Mandatory Task 3) */
        .card-back {
            transform: rotateY(180deg);
            padding: 30px 25px;
            box-sizing: border-box;
            background: linear-gradient(to bottom, #ffffff, #fcfcfc);
        }

        .back-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .word-back {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--primary-blue);
            margin-bottom: 8px;
        }

        .pos-mean {
            font-size: 1.4rem;
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 10px;
        }

        .pos {
            color: var(--text-gray);
            font-style: italic;
            font-weight: 400;
        }

        .chinese {
            font-weight: 700;
            color: var(--primary-blue);
        }

        /* 策略與口訣區塊 */
        .strategy-section {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 12px;
        }

        .strategy-tag {
            font-size: 1rem;
            color: var(--accent-orange);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .mnemonic-box {
            background-color: var(--accent-orange);
            color: white;
            padding: 20px;
            border-radius: 16px;
            font-size: 1.2rem;
            line-height: 1.6;
            font-weight: 600;
            box-shadow: 0 6px 15px rgba(230, 126, 34, 0.25);
            text-align: center;
        }

        /* 斜體灰色例句 */
        .example-sentence {
            font-style: italic;
            color: #95a5a6;
            font-size: 1rem;
            text-align: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px dashed #eee;
        }
    </style>
</head>
<body>

    <h1>🧠 B4L1 互動單字記憶卡</h1>

    <div class="card-container" id="vocabGrid">
        <!-- 卡片將由 JavaScript 動態生成 -->
    </div>

    <script>
        const grid1Url = "https://raw.githubusercontent.com/terenceylhc/vocB4/main/grid3.jpg";
        const grid2Url = "https://raw.githubusercontent.com/terenceylhc/vocB4/main/grid4.jpg";

        const vocabData = [
            { word: "individual", symbol: "/ˌɪndəˈvɪdʒuəl/", pos: "adj./n.", mean: "個別的/個人", strategy: "字根拆解", mnemonic: "一個不可分割的個人，緊抱著大硬殼。", grid: 1, x: 0, y: 0 },
            { word: "record", symbol: "/rɪˈkɔːrd/", pos: "vt.", mean: "錄影；記錄", strategy: "諧音記憶", mnemonic: "按下雷電按扣，開始錄影天空。", grid: 1, x: 1, y: 0 },
            { word: "rearrange", symbol: "/ˌriːəˈreɪndʒ/", pos: "vt.", mean: "重新安排", strategy: "字首拆解", mnemonic: "再次排列方塊，重新安排位置。", grid: 1, x: 2, y: 0 },
            { word: "seize", symbol: "/siz/", pos: "vt.", mean: "把握；抓住", strategy: "諧音記憶", mnemonic: "看見西施出現，趕快抓住機會求婚。", grid: 1, x: 3, y: 0 },
            { word: "intensive", symbol: "/ɪnˈtɛnsɪv/", pos: "adj.", mean: "密集的", strategy: "諧音記憶", mnemonic: "考前密集訓練，只能狂吃硬甜食。", grid: 1, x: 0, y: 1 },
            { word: "typical", symbol: "/ˈtɪpɪkəl/", pos: "adj.", mean: "典型的", strategy: "諧音記憶", mnemonic: "惡作劇的典型動作就是踢屁股。", grid: 1, x: 1, y: 1 },
            { word: "routine", symbol: "/ruˈtin/", pos: "n.", mean: "例行公事", strategy: "諧音記憶", mnemonic: "每天例行公事，生活死板如木丁。", grid: 1, x: 2, y: 1 },
            { word: "professional", symbol: "/prəˈfɛʃənəl/", pos: "adj.", mean: "專業的", strategy: "諧音記憶", mnemonic: "為了變專業，真的超破費神。", grid: 1, x: 3, y: 1 },
            { word: "electronic", symbol: "/ɪˌlɛkˈtrɑnɪk/", pos: "adj.", mean: "電子的", strategy: "字根聯想", mnemonic: "電子書本，插著插頭在充電。", grid: 1, x: 0, y: 2 },
            { word: "advance", symbol: "/ədˈvæns/", pos: "vi.", mean: "進步；進展", strategy: "諧音記憶", mnemonic: "機器人安穩拿碗當司機，科技大進步。", grid: 1, x: 1, y: 2 },
            { word: "sufficient", symbol: "/səˈfɪʃənt/", pos: "adj.", mean: "足夠的", strategy: "諧音記憶", mnemonic: "存糧足夠，舒服又省力。", grid: 1, x: 2, y: 2 },
            { word: "equipment", symbol: "/ɪˈkwɪpmənt/", pos: "n.", mean: "設備；裝備", strategy: "諧音記憶", mnemonic: "他的全套設備，只有一塊麵。", grid: 1, x: 3, y: 2 },
            { word: "ideal", symbol: "/aɪˈdiəl/", pos: "adj.", mean: "理想的", strategy: "諧音記憶", mnemonic: "愛迪生的兒子有最理想的燈泡。", grid: 1, x: 0, y: 3 },
            { word: "broadcast", symbol: "/ˈbrɔdˌkæst/", pos: "vt.", mean: "播送；廣播", strategy: "字義拆解", mnemonic: "訊號寬廣投射，向全球播送。", grid: 1, x: 1, y: 3 },
            { word: "global", symbol: "/ˈɡlobəl/", pos: "adj.", mean: "全球的", strategy: "字根聯想", mnemonic: "全球暖化，地球儀變冰淇淋融化。", grid: 1, x: 2, y: 3 },
            { word: "overseas", symbol: "/ˌovɚˈsiz/", pos: "adv.", mean: "海外地", strategy: "字義拆解", mnemonic: "帶著行李，跳過海洋到海外。", grid: 1, x: 3, y: 3 },
            { word: "sacrifice", symbol: "/ˈsækrəˌfaɪs/", pos: "vt./n.", mean: "犧牲", strategy: "諧音記憶", mnemonic: "為了救主人，這三塊餅乾快死了，甘願犧牲被吃掉。", grid: 2, x: 0, y: 0 },
            { word: "imagine", symbol: "/ɪˈmædʒɪn/", pos: "vt.", mean: "想像", strategy: "諧音記憶", mnemonic: "想像姨媽突然進來房間，要把我的電動收走。", grid: 2, x: 1, y: 0 },
            { word: "esports", symbol: "/isˈpɔrts/", pos: "n.", mean: "電子競技", strategy: "字義拆解", mnemonic: "電子滑鼠穿上球鞋跑馬拉松，這就是電競。", grid: 2, x: 2, y: 0 },
            { word: "tournament", symbol: "/ˈtɝnəmənt/", pos: "n.", mean: "錦標賽", strategy: "諧音記憶", mnemonic: "參加錦標賽壓力大到想吐，到底要吐哪個門？", grid: 2, x: 3, y: 0 },
            { word: "teamwork", symbol: "/ˈtimˌwɝk/", pos: "n.", mean: "團隊合作", strategy: "字義聯想", mnemonic: "兩隻小螞蟻抬著大齒輪，這就是團隊合作。", grid: 2, x: 0, y: 1 },
            { word: "full-time", symbol: "/ˌfʊlˈtaɪm/", pos: "adj.", mean: "全職的", strategy: "字面直譯", mnemonic: "我的沙漏時間全被塞滿了，因為我是全職員工。", grid: 2, x: 1, y: 1 },
            { word: "Hearthstone", symbol: "/ˈhɑrθˌston/", pos: "n.", mean: "爐石戰記", strategy: "字義拆解", mnemonic: "壁爐裡的石頭縫隙，藏著一張發光的卡片。", grid: 2, x: 2, y: 1 },
            { word: "Arena of Valor", symbol: "/əˈrinə ʌv ˈvælɚ/", pos: "n.", mean: "傳說對決", strategy: "意象組合", mnemonic: "在競技場中央，拔起代表勇氣的對決之劍。", grid: 2, x: 3, y: 1 },
            { word: "friendship", symbol: "/ˈfrɛndˌʃɪp/", pos: "n.", mean: "友情", strategy: "字義拆解", mnemonic: "載著朋友的友情之船，帆是愛心形狀。", grid: 2, x: 0, y: 2 },
            { word: "have no choice but to", symbol: "-", pos: "phr.", mean: "不得不", strategy: "情境記憶", mnemonic: "黑武士被困住了，不得不乖乖去練小提琴。", grid: 2, x: 1, y: 2 },
            { word: "make it up to sb", symbol: "-", pos: "phr.", mean: "補償", strategy: "視覺聯想", mnemonic: "把破掉的心補好，當作對你的補償。", grid: 2, x: 2, y: 2 },
            { word: "stand for", symbol: "-", pos: "phr.", mean: "代表", strategy: "字面直譯", mnemonic: "站在巨大的 X 上面，代表我是主角。", grid: 2, x: 3, y: 2 },
            { word: "key to", symbol: "-", pos: "phr.", mean: "關鍵", strategy: "視覺聯想", mnemonic: "拿著這支關鍵鑰匙，才能開啟成功的關鍵大門。", grid: 2, x: 0, y: 3 },
            { word: "make a living", symbol: "-", pos: "phr.", mean: "謀生", strategy: "視覺聯想", mnemonic: "在錢池子裡釣魚，這就是我的謀生之道。", grid: 2, x: 1, y: 3 },
            { word: "as a matter of fact", symbol: "-", pos: "phr.", mean: "其實", strategy: "諧音記憶", mnemonic: "阿是買一坨金子？事實上，那是真的。", grid: 2, x: 2, y: 3 },
            { word: "at least", symbol: "-", pos: "phr.", mean: "至少", strategy: "諧音記憶", mnemonic: "愛麗絲變大了，身高至少有十公尺高。", grid: 2, x: 3, y: 3 }
        ];

        function createCards() {
            const grid = document.getElementById('vocabGrid');
            vocabData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                
                // 計算 Sprite 位置 (4x4 Grid)
                const posX = (item.x / 3) * 100;
                const posY = (item.y / 3) * 100;
                const bgUrl = item.grid === 1 ? grid1Url : grid2Url;

                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front">
                            <div class="image-box" style="background-image: url('${bgUrl}'); background-position: ${posX}% ${posY}%;"></div>
                            <div class="front-content">
                                <h2 class="word-title">${item.word}</h2>
                                <div class="ipa-section">
                                    <span class="symbol">${item.symbol}</span>
                                    <button class="audio-btn" onclick="event.stopPropagation(); speak('${item.word}')">
                                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="card-back">
                            <div class="back-header">
                                <div class="word-back">${item.word}</div>
                                <div class="pos-mean">
                                    <span class="pos">${item.pos}</span>
                                    <span class="chinese">${item.mean}</span>
                                </div>
                            </div>
                            <div class="strategy-section">
                                <span class="strategy-tag">💡 ${item.strategy}</span>
                                <div class="mnemonic-box">
                                    ${item.mnemonic}
                                </div>
                            </div>
                            <div class="example-sentence">
                                Tap to see image & original word
                            </div>
                        </div>
                    </div>
                `;

                card.onclick = () => {
                    card.classList.toggle('is-flipped');
                    if (card.classList.contains('is-flipped')) {
                        speak(item.word);
                    }
                };

                grid.appendChild(card);
            });
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            msg.rate = 0.85;
            window.speechSynthesis.speak(msg);
        }

        window.onload = createCards;
    </script>
</body>
</html>
