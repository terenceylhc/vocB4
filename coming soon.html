<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMING SOON | 新野獸派風格</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide 圖示 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend+Mega:wght@400;900&display=swap');
        
        body {
            font-family: 'Lexend Mega', 'Courier New', monospace;
            background-color: #FFD100;
        }

        .brutalist-card {
            background-color: white;
            border: 6px solid black;
            box-shadow: 12px 12px 0px 0px rgba(0,0,0,1);
        }

        .brutalist-shadow-sm {
            box-shadow: 6px 6px 0px 0px rgba(0,0,0,1);
        }

        .brutalist-shadow-md {
            box-shadow: 8px 8px 0px 0px rgba(0,0,0,1);
        }

        .brutalist-button-shadow {
            box-shadow: 8px 8px 0px 0px rgba(255, 255, 255, 1);
        }

        .brutalist-button-shadow:hover {
            box-shadow: none;
            transform: translate(4px, 4px);
        }

        .hover-lift:hover {
            transform: translate(-4px, -4px);
            box-shadow: 12px 12px 0px 0px rgba(0,0,0,1);
        }

        @keyframes bounce-custom {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }
        .animate-bounce-custom {
            animation: bounce-custom 3s infinite ease-in-out;
        }
    </style>
</head>
<body class="min-h-screen w-full flex flex-col items-center justify-center p-6 overflow-x-hidden">

    <!-- 裝飾性背景元素 -->
    <div class="absolute top-10 left-10 animate-bounce-custom">
        <i data-lucide="star" class="w-12 h-12 text-black fill-black"></i>
    </div>
    <div class="absolute bottom-10 right-10 animate-pulse">
        <i data-lucide="sparkles" class="w-16 h-16 text-black"></i>
    </div>
    <div class="absolute top-20 right-20 rotate-12 hidden md:block">
        <div class="bg-white border-4 border-black p-4 brutalist-shadow-sm">
            <i data-lucide="smile" class="w-8 h-8 text-black"></i>
        </div>
    </div>

    <!-- 主要內容容器 -->
    <main class="relative z-10 max-w-3xl w-full">
        
        <!-- 頂部標籤 -->
        <div class="inline-block bg-[#00FF41] border-4 border-black px-6 py-2 mb-8 -rotate-2 brutalist-shadow-sm">
            <span class="text-xl font-black text-black tracking-tighter uppercase">
                Work in Progress
            </span>
        </div>

        <!-- 標題區塊 -->
        <div class="brutalist-card p-8 sm:p-12 mb-12">
            <h1 class="text-6xl sm:text-8xl font-black text-black leading-none mb-6 italic uppercase">
                COMING <br> SOON <span class="not-italic text-[#FF60F0]">!</span>
            </h1>
            <div class="h-2 w-full bg-black mb-6"></div>
            <p class="text-2xl sm:text-3xl font-bold text-black leading-tight">
                我們正在打造一些 <br>
                <span class="bg-[#FF60F0] px-2 text-white">超酷的東西</span>。
            </p>
        </div>

        <!-- 內容特點格點 -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-12">
            <div class="bg-[#ADFF00] border-4 border-black p-6 brutalist-shadow-md hover-lift transition-all cursor-default">
                <i data-lucide="zap" class="w-10 h-10 mb-4 fill-white text-black"></i>
                <h3 class="text-xl font-black mb-2">極速體驗</h3>
                <p class="font-bold">比你想像的還要快。</p>
            </div>
            <div class="bg-white border-4 border-black p-6 brutalist-shadow-md hover-lift transition-all cursor-default">
                <i data-lucide="heart" class="w-10 h-10 mb-4 fill-[#FF60F0] text-[#FF60F0]"></i>
                <h3 class="text-xl font-black mb-2">精心設計</h3>
                <p class="font-bold">每一像素都充滿靈魂。</p>
            </div>
        </div>

        <!-- 底部按鈕與連結 -->
        <div class="flex flex-col sm:flex-row items-center gap-8">
            <button class="w-full sm:w-auto bg-black text-white text-xl font-black px-10 py-5 border-4 border-black brutalist-button-shadow transition-all flex items-center justify-center gap-4">
                了解更多 <i data-lucide="arrow-right" class="w-6 h-6"></i>
            </button>
            
            <div class="flex gap-4">
                <a href="#" class="w-14 h-14 bg-[#FF60F0] border-4 border-black flex items-center justify-center text-xl font-black brutalist-shadow-sm hover:shadow-none hover:translate-x-1 hover:translate-y-1 transition-all">IG</a>
                <a href="#" class="w-14 h-14 bg-[#3B82F6] border-4 border-black flex items-center justify-center text-xl font-black brutalist-shadow-sm hover:shadow-none hover:translate-x-1 hover:translate-y-1 transition-all text-white">FB</a>
                <a href="#" class="w-14 h-14 bg-white border-4 border-black flex items-center justify-center text-xl font-black brutalist-shadow-sm hover:shadow-none hover:translate-x-1 hover:translate-y-1 transition-all">X</a>
            </div>
        </div>
    </main>

    <!-- 頁尾 -->
    <footer class="mt-20">
        <p class="text-xl font-black text-black bg-white border-2 border-black px-4 py-1 brutalist-shadow-sm">
            EST. 2026 / BRAND STUDIO
        </p>
    </footer>

    <script>
        // 初始化 Lucide 圖示
        lucide.createIcons();
    </script>
</body>
</html>
